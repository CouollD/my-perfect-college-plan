<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>今夜のスタメン — 結果</title>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Shippori+Mincho+B1:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<style>
body {
  background-image:
    linear-gradient(var(--rule) 1px, transparent 1px),
    linear-gradient(90deg, transparent calc(100% - 1px), rgba(192,57,43,0.15) calc(100% - 1px));
  background-size: 100% 28px, 100% 100%;
  background-position: 0 12px, 0 0;
}

/* ── ヘッダー ── */
.hd { padding: 32px 24px 0; position: relative; }
.hd::before {
  content:''; position:absolute;
  left:58px; top:0; bottom:-20px;
  width:1.5px; background:rgba(192,57,43,0.3);
}
.hd-eyebrow {
  font-family:'IBM Plex Mono',monospace; font-size:9px;
  color:var(--pencil); margin-left:48px; margin-bottom:6px; letter-spacing:.1em;
}
.hd-title {
  font-size:28px; font-weight:800; margin-left:48px;
  line-height:1.1; position:relative; display:inline-block;
}
.hd-title::after {
  content:''; position:absolute; left:-2px; right:-4px; bottom:-4px;
  height:3px; background:var(--ink); border-radius:1px;
}

/* ── メイン結果バナー ── */
.result-wrap { padding: 24px 24px 0 58px; }
.result-banner {
  background: var(--ink);
  color: var(--paper);
  border-radius: 14px 16px 14px 16px / 16px 14px 16px 14px;
  padding: 20px;
  text-align: center;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.result-banner::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    45deg, transparent, transparent 8px,
    rgba(255,255,255,0.03) 8px, rgba(255,255,255,0.03) 9px
  );
}
.result-banner-icon { font-size: 40px; margin-bottom: 6px; position: relative; }
.result-banner-title {
  font-size: 20px; font-weight: 800; line-height: 1.2;
  position: relative;
}
.result-banner-sub {
  font-family: 'Yomogi', cursive; font-size: 11px;
  color: rgba(255,255,255,0.6); margin-top: 6px;
  position: relative;
}
.badge-row {
  display: flex; gap: 8px; justify-content: center;
  margin-top: 10px; position: relative;
}
.badge {
  font-family: 'Yomogi', cursive; font-size: 10px;
  padding: 3px 10px; border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.4);
  color: rgba(255,255,255,0.85);
}
.badge.on { border-color: #f0c040; color: #f0c040; }

/* ── ヒロインカード ── */
.heroines-section { margin-bottom: 16px; }
.section-label {
  font-family: 'Yomogi', cursive; font-size: 10px;
  color: var(--pencil); margin-bottom: 8px;
}
.heroine-cards { display: flex; flex-direction: column; gap: 8px; }
.heroine-card {
  background: var(--paper);
  border: 2px solid var(--rule2);
  border-radius: 12px 14px 12px 14px / 14px 12px 14px 12px;
  padding: 12px 14px;
  display: flex; align-items: flex-start; gap: 12px;
  box-shadow: 2px 3px 0 rgba(28,26,20,0.07);
  position: relative;
}
.heroine-card.has-contact {
  border-color: var(--red);
  background: rgba(192,57,43,0.04);
}
.heroine-card-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
.heroine-card-body { flex: 1; min-width: 0; }
.heroine-card-name {
  font-size: 13px; font-weight: 700; margin-bottom: 2px;
}
.heroine-card-type {
  font-family: 'Yomogi', cursive; font-size: 9px;
  color: var(--pencil); margin-bottom: 5px;
}
.heroine-card-line {
  font-family: 'Yomogi', cursive; font-size: 11px;
  color: var(--ink); line-height: 1.6;
}
.contact-badge {
  position: absolute; top: 10px; right: 12px;
  font-family: 'Yomogi', cursive; font-size: 9px;
  background: var(--red); color: var(--paper);
  padding: 2px 8px; border-radius: 10px;
}

/* ── 記録セクション ── */
.record-section { margin-bottom: 20px; }
.record-cells { display: flex; gap: 8px; }
.record-cell {
  flex: 1; text-align: center; padding: 10px 4px;
  background: var(--paper2); border-radius: 8px;
  border: 1px solid var(--rule2);
}
.record-cell-label {
  font-family: 'Yomogi', cursive; font-size: 9px;
  color: var(--pencil); margin-bottom: 4px;
}
.record-cell-val {
  font-size: 14px; font-weight: 800; color: var(--ink);
  font-family: 'IBM Plex Mono', monospace;
}
.record-cell-val.red  { color: var(--red); }
.record-cell-val.blue { color: var(--blue); }

/* ── アクション ── */
.actions { padding: 0 24px 40px 58px; display: flex; flex-direction: column; gap: 10px; }
.action-btn {
  width: 100%; padding: 16px;
  border: 2px solid var(--ink2);
  border-radius: 12px 14px 12px 14px / 14px 12px 14px 12px;
  background: var(--paper); cursor: pointer;
  font-family: 'Yomogi', cursive; font-size: 13px;
  color: var(--ink); text-align: left;
  box-shadow: 2px 3px 0 rgba(28,26,20,0.1);
  transition: all .15s;
  display: flex; align-items: center; gap: 12px;
}
.action-btn:hover { transform: translateY(-1px); box-shadow: 3px 4px 0 rgba(28,26,20,0.16); }
.action-btn:active { transform: scale(.98); }
.action-btn.primary {
  background: var(--ink); color: var(--paper);
  border-color: var(--ink);
}
.action-btn.primary:hover { background: var(--red); border-color: var(--red); }
.action-icon { font-size: 20px; flex-shrink: 0; }
.action-body { flex: 1; }
.action-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.action-desc { font-size: 10px; opacity: .7; }
.action-arrow { font-size: 14px; opacity: .5; }

/* 友達解放通知 */
.new-friend-section { margin: 0 24px 0 58px; display: flex; flex-direction: column; gap: 8px; }
.new-friend-label { font-family: 'Yomogi', cursive; font-size: 10px; color: var(--ok); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.new-friend-label::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }
.new-friend-card {
  background: rgba(46,125,66,.06);
  border: 1.5px solid var(--ok);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.new-friend-icon { font-size: 22px; flex-shrink: 0; }
.new-friend-info { flex: 1; }
.new-friend-name { font-size: 13px; font-weight: 700; color: var(--ok); margin-bottom: 2px; }
.new-friend-reason { font-family: 'Yomogi', cursive; font-size: 9px; color: var(--pencil); line-height: 1.5; }
.new-friend-by { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: var(--ok); opacity: .7; }
</style>
</head>
<body>
<div id="root">

  <div class="hd">
    <div class="hd-eyebrow">RESULT — 合コン結果</div>
    <div class="hd-title">今夜の記録</div>
  </div>

  <div class="result-wrap">

    <div class="result-banner">
      <div class="result-banner-icon" id="result-icon">🎉</div>
      <div class="result-banner-title" id="result-title">—</div>
      <div class="result-banner-sub" id="result-sub"></div>
      <div class="badge-row" id="badge-row"></div>
    </div>

    <div class="heroines-section">
      <div class="section-label">← 今夜の反応</div>
      <div class="heroine-cards" id="heroine-cards"></div>
    </div>

    <div class="record-section">
      <div class="section-label">← 大学生活の記録</div>
      <div class="record-cells">
        <div class="record-cell">
          <div class="record-cell-label">合コン回数</div>
          <div class="record-cell-val red" id="info-count">—</div>
        </div>
        <div class="record-cell">
          <div class="record-cell-label">現在</div>
          <div class="record-cell-val" id="info-time">—</div>
        </div>
        <div class="record-cell">
          <div class="record-cell-label">卒業まで</div>
          <div class="record-cell-val blue" id="info-remain">—</div>
        </div>
      </div>
    </div>

  </div>

  <!-- 友達解放通知（JSで動的生成） -->
  <div id="new-friend-wrap" style="display:none; margin-bottom:16px;"></div>

  <div class="actions">
    <button class="action-btn primary" onclick="location.href='formation.html'">
      <div class="action-icon">🍺</div>
      <div class="action-body">
        <div class="action-title">次の合コンへ</div>
        <div class="action-desc">メンバーを組み直して再挑戦</div>
      </div>
      <div class="action-arrow">→</div>
    </button>
    <button class="action-btn" onclick="location.href='../index.html'">
      <div class="action-icon">📓</div>
      <div class="action-body">
        <div class="action-title">タイトルに戻る</div>
        <div class="action-desc">セーブはされています</div>
      </div>
      <div class="action-arrow">→</div>
    </button>
  </div>

</div>

<script src="../data/gamedata.js"></script>
<script src="../data/gamestate.js"></script>
<script src="../data/flags.js"></script>
<script>
const savedResult    = JSON.parse(localStorage.getItem('goukon_result') || 'null');
const heroineStatus  = savedResult?.heroineStatus || {};
const contactId      = savedResult?.contactId      || null;
const nijikaiSuccess = savedResult?.nijikaiSuccess || false;
const heroineIds     = Object.keys(heroineStatus).map(Number);
const savedParty     = JSON.parse(localStorage.getItem('goukon_party') || '[]');

function getTier(heart, isContact) {
  if (isContact)   return 'contact';
  if (heart >= 50) return 'good';
  if (heart >= 35) return 'normal';
  return 'cold';
}

const TIER_ICON = { contact:'📱', good:'😊', normal:'😐', cold:'😶' };

function calcBanner() {
  if (contactId) {
    const h = HEROINES.find(x => x.id === contactId);
    return { icon:'📱', title:`${h?.name.split(' ')[1] ?? ''}と連絡先交換！`, sub:'今夜は最高だった。' };
  }
  const maxHeart = Math.max(...heroineIds.map(id => heroineStatus[id]?.heart || 0));
  if (maxHeart >= 50) {
    const topId = heroineIds.find(id => (heroineStatus[id]?.heart || 0) === maxHeart);
    const h = HEROINES.find(x => x.id === topId);
    return { icon:'😊', title:`${h?.name.split(' ')[1] ?? ''}といい感じ`, sub:'連絡先まであと一歩だった。' };
  }
  if (maxHeart >= 35) return { icon:'😐', title:'悪くはなかった', sub:'次回は布陣を見直してみよう。' };
  return { icon:'😮‍💨', title:'今夜は縁がなかった', sub:'場数を踏めた。次に活かそう。' };
}

function render() {
  // バナー
  const banner = calcBanner();
  document.getElementById('result-icon').textContent  = banner.icon;
  document.getElementById('result-title').textContent = banner.title;
  document.getElementById('result-sub').textContent   = banner.sub;

  // 二次会バッジ
  document.getElementById('badge-row').innerHTML = nijikaiSuccess
    ? `<div class="badge on">🌙 二次会あり</div>`
    : `<div class="badge">一次会のみ</div>`;

  // ヒロインカード
  const cards = document.getElementById('heroine-cards');
  cards.innerHTML = '';
  heroineIds.forEach(id => {
    const h         = HEROINES.find(x => x.id === id);
    const heart     = heroineStatus[id]?.heart || 0;
    const isContact = (id === contactId);
    const tier      = getTier(heart, isContact);
    const line      = h?.result_lines?.[tier] ?? '—';

    const card = document.createElement('div');
    card.className = 'heroine-card' + (isContact ? ' has-contact' : '');
    card.innerHTML = `
      <div class="heroine-card-icon">${TIER_ICON[tier]}</div>
      <div class="heroine-card-body">
        <div class="heroine-card-name">${h?.name ?? id}</div>
        <div class="heroine-card-type">${h?.type ?? ''}</div>
        <div class="heroine-card-line">${line}</div>
      </div>
      ${isContact ? '<div class="contact-badge">📱 連絡先</div>' : ''}
    `;
    cards.appendChild(card);
  });

  // 大学生活の記録
  GameState.load();
  const count   = (GameState.goukonCount || 0) + 1;
  const year    = GameState.year  || 1;
  const month   = GameState.month || 4;
  // 4年3月が卒業 = 1年4月から39ヶ月
  const elapsed = (year - 1) * 12 + (month - 4);
  const remain  = Math.max(0, 39 - elapsed);

  document.getElementById('info-count').textContent  = `${count}回目`;
  document.getElementById('info-time').textContent   = `${year}年${month}月`;
  document.getElementById('info-remain').textContent = `${remain}ヶ月`;

  // GameStateに保存
  const heroineResults = {};
  heroineIds.forEach(id => {
    const s = heroineStatus[id];
    heroineResults[id] = {
      heartGained: (s?.heart || 0) - (s?.heartPrev || 0),
      contact: id === contactId,
    };
  });
  GameState.finishGoukon(heroineResults, savedParty);

  // 友達解放チェック
  const newFriends = GameState.checkFriendDiscovery();
  if(newFriends.length) {
    const wrap = document.getElementById('new-friend-wrap');
    wrap.style.display = 'block';
    wrap.innerHTML = `
      <div class="new-friend-section">
        <div class="new-friend-label">新しい友達ができた</div>
        ${newFriends.map(({introducedBy, introduced, reason}) => `
          <div class="new-friend-card">
            <div class="new-friend-icon">🤝</div>
            <div class="new-friend-info">
              <div class="new-friend-name">${introduced.name}</div>
              <div class="new-friend-reason">「${reason}」</div>
              <div class="new-friend-by">${introducedBy.name} の紹介</div>
            </div>
          </div>
        `).join('')}
      </div>`;
  }
}

render();
</script>
</body>
</html>
