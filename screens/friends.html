<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>友達一覧</title>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Shippori+Mincho+B1:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:     #f5f0e6;
  --bg2:    #ede7d8;
  --bg3:    #e4dcc8;
  --ink:    #1c1a14;
  --ink2:   #3a3628;
  --muted:  #9a9080;
  --pencil: #7a7060;
  --red:    #c0392b;
  --blue:   #2c4a8a;
  --ok:     #2e7d42;
  --gold:   #8a6a00;
  --rule:   rgba(28,26,20,0.10);
  --rule2:  rgba(28,26,20,0.20);
}

html, body { height: 100%; background: #2a2520; }

.phone {
  max-width: 390px;
  min-height: 100dvh;
  margin: 0 auto;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ステータスバー */
.status-bar {
  background: #1c1a14;
  color: #f5f0e6;
  padding: 10px 20px 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  flex-shrink: 0;
}
.status-bar-time { font-weight: 600; letter-spacing: .05em; }
.status-icons { display: flex; gap: 6px; align-items: center; }

/* ナビバー */
.nav-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--rule2);
  padding: 12px 20px 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.nav-back {
  background: none; border: none;
  font-family: 'Yomogi', cursive;
  font-size: 13px; color: var(--blue);
  cursor: pointer; padding: 4px 0;
}
.nav-title {
  font-size: 17px; font-weight: 800; flex: 1; text-align: center;
  font-family: 'Shippori Mincho B1', serif;
}
.nav-right { width: 48px; text-align: right; }

/* フィルタータブ */
.filter-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--rule2);
  padding: 8px 16px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  flex-shrink: 0;
}
.filter-bar::-webkit-scrollbar { display: none; }
.ftab {
  padding: 4px 14px;
  border: 1.5px solid var(--rule2);
  border-radius: 20px;
  font-family: 'Yomogi', cursive;
  font-size: 10px; color: var(--pencil);
  cursor: pointer; white-space: nowrap;
  background: var(--bg);
  transition: all .15s;
}
.ftab.active {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--bg);
  font-weight: 700;
}

/* スクリーン */
.screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* ── 一覧 ── */
.section-header {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: .1em;
  color: var(--muted);
  padding: 10px 20px 6px;
  background: var(--bg3);
  border-bottom: 1px solid var(--rule);
  text-transform: uppercase;
}

.friend-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  background: var(--bg);
  transition: background .1s;
}
.friend-row:active { background: var(--bg2); }
.friend-row.locked { opacity: .45; cursor: default; }

.friend-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--bg2);
  border: 1.5px solid var(--rule2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  position: relative;
}
.friend-icon-lock {
  position: absolute; bottom: -2px; right: -2px;
  font-size: 10px; background: var(--bg); border-radius: 50%;
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
}

.friend-info { flex: 1; min-width: 0; }
.friend-name {
  font-size: 14px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.friend-tag {
  font-family: 'Yomogi', cursive;
  font-size: 9px; color: var(--pencil);
}

.friend-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.intimacy-val {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: var(--blue);
}
.intimacy-bar-wrap { width: 36px; height: 3px; background: var(--rule2); border-radius: 2px; overflow: hidden; }
.intimacy-bar-fill { height: 100%; background: var(--blue); border-radius: 2px; }
.friend-arrow { color: var(--muted); font-size: 14px; margin-left: 4px; flex-shrink: 0; }

/* ── 詳細 ── */
#detail-screen {
  display: none;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
}
#detail-screen.open { transform: translateX(0); }
#list-screen { transition: transform .25s cubic-bezier(.4,0,.2,1); }
#list-screen.pushed { transform: translateX(-30%); pointer-events: none; }

.detail-avatar-wrap {
  background: var(--bg2);
  padding: 32px 0 20px;
  display: flex; flex-direction: column; align-items: center;
  border-bottom: 1px solid var(--rule2);
  flex-shrink: 0;
}
.detail-avatar-big {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--bg3);
  border: 2px solid var(--rule2);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  margin-bottom: 10px;
}
.detail-dname { font-size: 20px; font-weight: 800; margin-bottom: 3px; }
.detail-dtype { font-family: 'Yomogi', cursive; font-size: 10px; color: var(--pencil); }

.detail-body { padding: 16px 20px 40px; display: flex; flex-direction: column; gap: 14px; }

/* 親密度メーター */
.detail-meter-card {
  background: var(--bg2);
  border: 1.5px solid var(--rule2);
  border-radius: 12px;
  padding: 14px 16px;
}
.detail-meter-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; letter-spacing: .1em;
  color: var(--muted); margin-bottom: 10px;
}
.meter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.meter-row:last-child { margin-bottom: 0; }
.meter-label { font-family: 'Yomogi', cursive; font-size: 10px; color: var(--pencil); width: 44px; flex-shrink: 0; }
.meter-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.meter-fill { height: 100%; border-radius: 3px; }
.fill-intimacy { background: var(--blue); }
.fill-avg { background: var(--pencil); opacity: .5; }
.meter-val { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink2); width: 26px; text-align: right; }

/* パラメータグリッド */
.detail-params {
  background: var(--bg2);
  border: 1.5px solid var(--rule2);
  border-radius: 12px;
  padding: 12px 16px;
}
.detail-params-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; letter-spacing: .1em;
  color: var(--muted); margin-bottom: 10px;
}
.params-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
.param-cell { text-align: center; }
.param-name { font-family: 'IBM Plex Mono', monospace; font-size: 7px; color: var(--muted); display: block; margin-bottom: 2px; }
.param-grade { font-size: 13px; font-weight: 700; display: block; }
.grade-ss { color: var(--red); }
.grade-s  { color: var(--ink); }
.grade-a  { color: var(--ink2); }
.grade-b  { color: var(--pencil); }
.grade-x  { color: var(--muted); }

/* 特性・注意事項 */
.detail-traits { display: flex; flex-wrap: wrap; gap: 6px; }
.trait {
  font-family: 'Yomogi', cursive;
  font-size: 9px; padding: 3px 9px;
  border-radius: 20px;
  background: var(--bg2);
  border: 1.5px solid var(--rule2);
  color: var(--ink2);
}
.trait.danger { background: rgba(192,57,43,.08); color: var(--red); border-color: var(--red); }
.trait.safe   { background: rgba(46,125,66,.08);  color: var(--ok);  border-color: var(--ok); }

.detail-note {
  font-family: 'Yomogi', cursive;
  font-size: 11px; color: var(--pencil);
  line-height: 1.8;
  background: var(--bg2);
  border-left: 3px solid var(--rule2);
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
}
.detail-note.warn { border-color: var(--red); }

/* 紹介できる人バッジ */
.introduces-section { display: flex; flex-direction: column; gap: 6px; }
.introduces-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; letter-spacing: .1em; color: var(--muted);
}
.intro-chip {
  display: flex; align-items: center; gap: 8px;
  background: rgba(46,125,66,.06);
  border: 1.5px solid var(--ok);
  border-radius: 10px; padding: 8px 12px;
}
.intro-chip-name { font-size: 12px; font-weight: 700; color: var(--ok); flex: 1; }
.intro-chip-cond { font-family: 'Yomogi', cursive; font-size: 9px; color: var(--pencil); }

/* ロック状態 */
.detail-locked-msg {
  text-align: center; padding: 40px 20px;
  font-family: 'Yomogi', cursive;
  font-size: 12px; color: var(--muted); line-height: 2;
}
</style>
</head>
<body>
<div class="phone">

  <div class="status-bar">
    <span class="status-bar-time" id="status-time">9:41</span>
    <div class="status-icons"><span>●●●</span><span>WiFi</span><span>🔋</span></div>
  </div>

  <!-- ナビ（一覧） -->
  <div id="nav-list">
    <div class="nav-bar">
      <button class="nav-back" onclick="location.href='../index.html'">← ホーム</button>
      <div class="nav-title">友達一覧</div>
      <div class="nav-right" id="nav-count" style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);"></div>
    </div>
    <div class="filter-bar">
      <div class="ftab active" data-f="all"    onclick="setFilter(this)">全員</div>
      <div class="ftab"        data-f="circle" onclick="setFilter(this)">サークル</div>
      <div class="ftab"        data-f="class"  onclick="setFilter(this)">ゼミ</div>
      <div class="ftab"        data-f="part"   onclick="setFilter(this)">バイト</div>
      <div class="ftab"        data-f="old"    onclick="setFilter(this)">幼馴染</div>
    </div>
  </div>

  <!-- ナビ（詳細） -->
  <div id="nav-detail" style="display:none;">
    <div class="nav-bar">
      <button class="nav-back" onclick="closeDetail()">← 一覧</button>
      <div class="nav-title" id="nav-detail-name">—</div>
      <div style="width:48px;"></div>
    </div>
  </div>

  <!-- 一覧画面 -->
  <div class="screen" id="list-screen">
    <div id="list-area"></div>
  </div>

  <!-- 詳細画面 -->
  <div class="screen" id="detail-screen">
    <div class="detail-avatar-wrap">
      <div class="detail-avatar-big" id="d-avatar">👤</div>
      <div class="detail-dname" id="d-name">—</div>
      <div class="detail-dtype" id="d-type">—</div>
    </div>
    <div class="detail-body" id="d-body"></div>
  </div>

</div>

<script src="../data/gamedata.js"></script>
<script src="../data/gamestate.js"></script>
<script src="../data/flags.js"></script>
<script>
GameState.load();

// 時計
function updateClock() {
  const d = new Date();
  document.getElementById('status-time').textContent =
    d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 10000);

const PLABELS = {comm:'コミュ',visu:'ビジュ',head:'頭',tact:'手際',air:'空気',mental:'心'};
const GROUP_LABELS = {circle:'サークル仲間', class:'ゼミ仲間', part:'バイト仲間', old:'幼馴染'};
const GROUP_ICONS  = {circle:'⚽', class:'📚', part:'☕', old:'👥'};
const GROUPS = ['circle','class','part','old'];

const discovered = GameState._data?.discoveredFriends || [];

function isAvailable(c) {
  if (c.locked) return false;
  if (c.discoverable) return discovered.includes(c.id);
  const cfg = loadConfig() || {};
  const sameCircle = cfg.circle !== 'none' && c.circle === cfg.circle;
  const samePart   = cfg.part   !== 'none' && c.part   === cfg.part;
  const isCommon   = c.group === 'old' || c.group === 'class';
  return sameCircle || samePart || isCommon || discovered.includes(c.id);
}

function getIntimacy(c) {
  return GameState._data?.friendRelation?.[c.id]?.intimacy || 0;
}

let currentFilter = 'all';

function setFilter(el) {
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.f;
  renderList();
}

function renderList() {
  const area = document.getElementById('list-area');
  let html = '';
  let total = 0;

  GROUPS.forEach(group => {
    if (currentFilter !== 'all' && currentFilter !== group) return;
    const members = CHARACTERS.filter(c => c.group === group && isAvailable(c));
    if (!members.length) return;
    total += members.length;

    html += `<div class="section-header">${GROUP_ICONS[group]} ${GROUP_LABELS[group]}</div>`;
    members.forEach(c => {
      const intimacy = getIntimacy(c);
      html += `
        <div class="friend-row" onclick="openDetail(${c.id})">
          <div class="friend-icon">
            ${GROUP_ICONS[c.group]}
          </div>
          <div class="friend-info">
            <div class="friend-name">${c.name}</div>
            <div class="friend-tag">${c.type}</div>
          </div>
          <div class="friend-right">
            <div class="intimacy-val">親密 ${intimacy}</div>
            <div class="intimacy-bar-wrap">
              <div class="intimacy-bar-fill" style="width:${Math.min(100,intimacy)}%"></div>
            </div>
          </div>
          <div class="friend-arrow">›</div>
        </div>`;
    });
  });

  document.getElementById('nav-count').textContent = total + '人';
  area.innerHTML = html || `<div style="padding:60px 20px;text-align:center;font-family:'Yomogi',cursive;font-size:11px;color:var(--muted);">表示できるメンバーがいません</div>`;
}

function openDetail(cid) {
  const c = CHARACTERS.find(x => x.id === cid);
  if (!c) return;

  const intimacy = getIntimacy(c);
  const avgParam = Math.round(Object.values(c.params).reduce((a,b)=>a+b,0) / Object.keys(c.params).length);
  const avgMax   = Math.round(Object.values(c.maxParams).reduce((a,b)=>a+b,0) / Object.keys(c.maxParams).length);

  document.getElementById('nav-detail-name').textContent = c.name.split(' ')[1] || c.name;
  document.getElementById('d-avatar').textContent = GROUP_ICONS[c.group];
  document.getElementById('d-name').textContent = c.name;
  document.getElementById('d-type').textContent = c.type;

  // 紹介できる人リスト
  const introPending = (c.introduces || []).filter(i => {
    const targetAvail = discovered.includes(i.id) || CHARACTERS.find(x=>x.id===i.id&&!x.discoverable&&isAvailable(x));
    return !targetAvail && intimacy < i.minIntimacy;
  });
  const introDone = (c.introduces || []).filter(i => {
    const target = CHARACTERS.find(x => x.id === i.id);
    return target && (discovered.includes(i.id) || isAvailable(target));
  });

  const intimacyPct = Math.min(100, intimacy);
  const avgPct = Math.min(100, avgParam);
  const avgMaxPct = Math.min(100, avgMax);

  const traitsHtml = (c.traits || []).map(t => {
    const cls = (t === '暴走しやすい' || t === '惚れっぽい') ? 'danger'
              : t === '譲れる' ? 'safe' : '';
    return `<span class="trait ${cls}">${t}</span>`;
  }).join('');

  const paramsHtml = Object.entries(PLABELS).map(([k, label]) => `
    <div class="param-cell">
      <span class="param-name">${label}</span>
      <span class="param-grade ${GRADE_CLASS(c.params[k]||0)}">${GRADE(c.params[k]||0)}</span>
    </div>`).join('');

  const introducesHtml = (c.introduces || []).length ? `
    <div class="introduces-section">
      <div class="introduces-label">INTRODUCES — 紹介できる人</div>
      ${(c.introduces || []).map(i => {
        const target = CHARACTERS.find(x => x.id === i.id);
        if (!target) return '';
        const unlocked = discovered.includes(i.id) || isAvailable(target);
        return `
          <div class="intro-chip" style="${unlocked ? 'opacity:.5;' : ''}">
            <span style="font-size:16px;">${unlocked ? '✅' : '🤝'}</span>
            <span class="intro-chip-name">${target.name}</span>
            <span class="intro-chip-cond">${unlocked ? '紹介済み' : `親密度${i.minIntimacy}で紹介`}</span>
          </div>`;
      }).join('')}
    </div>` : '';

  document.getElementById('d-body').innerHTML = `
    <div class="detail-meter-card">
      <div class="detail-meter-title">RELATIONSHIP</div>
      <div class="meter-row">
        <div class="meter-label">親密度</div>
        <div class="meter-track"><div class="meter-fill fill-intimacy" style="width:${intimacyPct}%"></div></div>
        <div class="meter-val">${intimacy}</div>
      </div>
      <div class="meter-row">
        <div class="meter-label">現在値</div>
        <div class="meter-track"><div class="meter-fill fill-avg" style="width:${avgPct}%"></div></div>
        <div class="meter-val">${avgParam}</div>
      </div>
      <div class="meter-row">
        <div class="meter-label">MAX値</div>
        <div class="meter-track"><div class="meter-fill" style="width:${avgMaxPct}%;background:var(--pencil);opacity:.7;"></div></div>
        <div class="meter-val">${avgMax}</div>
      </div>
    </div>

    <div class="detail-params">
      <div class="detail-params-title">PARAMETERS</div>
      <div class="params-grid">${paramsHtml}</div>
    </div>

    <div class="detail-traits">${traitsHtml}</div>

    <div class="detail-note ${c.limit ? 'warn' : ''}">
      ${c.limit ? '⚠ ' + c.limit + '<br>' : ''}${c.note || ''}
    </div>

    ${introducesHtml}
  `;

  // スライドアニメーション
  document.getElementById('list-screen').classList.add('pushed');
  const det = document.getElementById('detail-screen');
  det.style.display = 'flex';
  document.getElementById('nav-list').style.display   = 'none';
  document.getElementById('nav-detail').style.display = 'block';
  requestAnimationFrame(() => requestAnimationFrame(() => det.classList.add('open')));
}

function closeDetail() {
  const det = document.getElementById('detail-screen');
  det.classList.remove('open');
  document.getElementById('list-screen').classList.remove('pushed');
  setTimeout(() => {
    det.style.display = 'none';
    document.getElementById('nav-list').style.display   = 'block';
    document.getElementById('nav-detail').style.display = 'none';
  }, 260);
}

renderList();
</script>
</body>
</html>
