<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>大学生活攻略録 — 合コン</title>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Shippori+Mincho+B1:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<style>
*{box-sizing:border-box;}
body{
  background:#1a1612;
  color:#f5f0e6;
  font-family:'Shippori Mincho B1',serif;
  margin:0;min-height:100vh;
  background-image:none;
}

/* ── ノベルレイアウト ── */
#novel-root{
  max-width:480px;margin:0 auto;
  min-height:100vh;
  display:flex;flex-direction:column;
  position:relative;
}

/* ── ステータスバー（最上部） ── */
.status-bar{
  padding:8px 14px 6px;
  background:rgba(26,22,18,0.95);
  border-bottom:1px solid rgba(192,57,43,0.3);
  display:flex;align-items:center;gap:8px;
  position:sticky;top:0;z-index:10;
}
.phase-badge{
  font-family:'Yomogi',cursive;font-size:9px;
  color:var(--red);border:1px solid var(--red);
  border-radius:8px;padding:2px 8px;
}
.air-mini{flex:1;display:flex;align-items:center;gap:6px;}
.air-mini-label{font-family:'Yomogi',cursive;font-size:9px;color:#9a9080;}
.air-mini-track{flex:1;height:4px;background:#2a2520;border-radius:2px;overflow:hidden;}
.air-mini-fill{height:100%;border-radius:2px;transition:width .5s,background .5s;}
.air-hi{background:#2e7d42;}.air-md{background:#8a6a00;}.air-lo{background:#c0392b;}
.air-mini-val{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#9a9080;width:20px;}
.turn-info{font-family:'IBM Plex Mono',monospace;font-size:8px;color:#5a5048;}

/* ── 立ち絵エリア ── */
.stage{
  position:relative;
  height:260px;
  background:linear-gradient(to bottom, #0d0b09 0%, #1a1612 100%);
  overflow:hidden;
  flex-shrink:0;
}
.stage-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 80%, rgba(192,57,43,0.06) 0%, transparent 70%);
}
/* 立ち絵コンテナ */
.sprites{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;justify-content:center;align-items:flex-end;
  gap:0;
  height:100%;
}
.sprite{
  position:relative;
  width:130px;
  height:210px;
  flex-shrink:0;
  transition:all .4s ease;
  overflow:hidden;
}
.sprite img, .sprite svg{
  width:100%;
  height:180%;           /* 全身画像の上半身だけ表示 */
  object-fit:cover;
  object-position:top center;  /* 上半身を優先 */
  filter:brightness(.85);
  transition:filter .3s,transform .3s;
}
.sprite.active img, .sprite.active svg{
  filter:brightness(1);
  transform:scale(1.04) translateY(-2px);
}
.sprite.dim img, .sprite.dim svg{
  filter:brightness(.4) grayscale(.5);
}
/* 名前ラベル */
.sprite-label{
  position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  font-family:'Yomogi',cursive;font-size:8px;color:rgba(245,240,230,0.6);
  white-space:nowrap;
  background:rgba(26,22,18,0.6);padding:1px 6px;border-radius:4px;
}

/* フェーズ表示 */
.phases-row{
  display:flex;
  background:rgba(26,22,18,0.8);
  border-top:1px solid rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.ph{
  flex:1;text-align:center;padding:5px 2px;
  font-family:'Yomogi',cursive;font-size:8px;
  color:#3a3628;
  border-right:1px solid rgba(255,255,255,0.05);
  transition:all .2s;
}
.ph:last-child{border-right:none;}
.ph.done{color:#2e7d42;}
.ph.done::before{content:'✓';}
.ph.active{color:#f5f0e6;background:rgba(192,57,43,0.15);}

/* 友達ステータス */
.friends-bar{
  display:flex;gap:5px;padding:6px 14px;
  background:rgba(26,22,18,0.7);
  border-bottom:1px solid rgba(255,255,255,0.05);
  flex-wrap:wrap;
}
.fc{
  display:flex;flex-direction:column;gap:2px;
  padding:3px 8px;border-radius:6px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  font-size:8px;
}
.fc.warn{border-color:rgba(192,57,43,0.5);background:rgba(192,57,43,0.08);}
.fc-name{font-family:'Yomogi',cursive;color:#c8b89a;}
.fc-obs{font-family:'IBM Plex Mono',monospace;font-size:7px;color:#5a5048;}
.fc-obs.hi{color:#c0392b;}
.fc-flavor{font-family:'Yomogi',cursive;font-size:8px;color:#7a6a5a;}

/* ── テキストボックス ── */
.textbox{
  padding:12px 14px 10px;
  background:rgba(20,17,14,0.92);
  border-top:1px solid rgba(192,57,43,0.25);
  min-height:90px;
  position:relative;
}
.textbox-speaker{
  font-family:'Yomogi',cursive;font-size:10px;
  color:var(--red);margin-bottom:5px;
  letter-spacing:.05em;
}
.textbox-main{
  font-size:14px;font-weight:700;
  line-height:1.7;color:#f5f0e6;
  min-height:40px;
}
.textbox-sub{
  font-family:'Yomogi',cursive;font-size:10px;
  color:#7a6a5a;margin-top:4px;line-height:1.6;
}
.textbox-result{
  font-family:'Yomogi',cursive;font-size:11px;
  margin-top:8px;padding-top:8px;
  border-top:1px solid rgba(255,255,255,0.08);
  line-height:1.6;display:none;
}
.textbox-result.good{color:#7dcf8a;}
.textbox-result.warning{color:#e07070;}
.textbox-result.info{color:#7ab0e0;}

/* ── コマンドエリア ── */
.cmd-area{
  padding:8px 14px 14px;
  background:rgba(26,22,18,0.95);
  border-top:1px solid rgba(255,255,255,0.05);
}
.cmd-area-label{
  font-family:'Yomogi',cursive;font-size:9px;
  color:#5a5048;margin-bottom:6px;
  display:flex;justify-content:space-between;
}
.cmd-ap{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#c0392b;}
.cmd-grid{display:flex;flex-direction:column;gap:4px;}
.cmd{
  background:rgba(40,34,28,0.9);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;padding:8px 10px;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:8px;
}
.cmd:hover:not(.disabled){
  border-color:rgba(192,57,43,0.6);
  background:rgba(192,57,43,0.1);
  transform:translateY(-1px);
}
.cmd:active:not(.disabled){transform:scale(.98);}
.cmd.friend-type{border-color:rgba(44,74,138,0.4);background:rgba(44,74,138,0.08);}
.cmd.risk-type{border-color:rgba(192,57,43,0.3);}
.cmd.event-type{border-color:rgba(138,106,0,0.4);background:rgba(138,106,0,0.06);}
.cmd.skip-type{border-color:rgba(255,255,255,0.05);background:rgba(255,255,255,0.02);}
.cmd.disabled{opacity:.25;pointer-events:none;}
.cmd-icon{font-size:14px;flex-shrink:0;}
.cmd-body{flex:1;min-width:0;}
.cmd-name{font-size:11px;font-weight:700;margin-bottom:1px;line-height:1.2;color:#f5f0e6;}
.cmd-effect{font-family:'Yomogi',cursive;font-size:8px;color:#7dcf8a;margin-bottom:1px;}
.cmd-desc{font-family:'Yomogi',cursive;font-size:8px;color:#7a6a5a;line-height:1.4;}
.cmd-tag{font-size:7px;padding:1px 5px;border-radius:5px;flex-shrink:0;white-space:nowrap;}
.tag-r{color:#e07070;border:1px solid rgba(192,57,43,0.5);}
.tag-f{color:#7ab0e0;border:1px solid rgba(44,74,138,0.4);}
.tag-e{color:#c8a84a;border:1px solid rgba(138,106,0,0.4);}
.section-divider{
  font-family:'Yomogi',cursive;font-size:8px;color:#3a3020;
  margin:6px 0 4px;padding-bottom:3px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* ── オープニング演出 ── */
.opening{
  position:fixed;inset:0;
  background:#0d0b09;
  z-index:100;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .5s;
}
.opening.fade{opacity:0;pointer-events:none;}
.opening-sprites{
  display:flex;gap:8px;justify-content:center;
  margin-bottom:20px;
}
.opening-sprite{
  width:120px;height:190px;
  transition:all .4s;
  overflow:hidden;
}
.opening-sprite img,.opening-sprite svg{
  width:100%;
  height:175%;
  object-fit:cover;
  object-position:top center;
}
.opening-label{
  font-family:'Yomogi',cursive;font-size:13px;color:#c8b89a;
  margin-bottom:8px;letter-spacing:.1em;
}
.opening-names{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  margin-bottom:20px;
}
.opening-name{
  font-family:'Yomogi',cursive;font-size:10px;
  color:#f5f0e6;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;padding:4px 10px;
}
.opening-tap{
  font-family:'Yomogi',cursive;font-size:10px;
  color:#5a5048;animation:blink 1.5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── オーバーレイ ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(10,8,6,0.92);
  display:flex;align-items:center;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;
}
.overlay.show{opacity:1;pointer-events:all;}
.ov-card{
  background:#1e1a16;
  border:2px solid rgba(192,57,43,0.5);
  border-radius:12px;padding:22px;
  max-width:300px;width:90%;
  box-shadow:0 0 40px rgba(192,57,43,0.15);
  transform:scale(.92);transition:transform .3s;text-align:center;
}
.overlay.show .ov-card{transform:scale(1);}
.ov-icon{font-size:32px;margin-bottom:8px;}
.ov-title{font-size:16px;font-weight:800;margin-bottom:6px;color:#f5f0e6;}
.ov-body{font-family:'Yomogi',cursive;font-size:11px;color:#9a9080;line-height:1.8;margin-bottom:14px;white-space:pre-line;}
.ov-btn{
  width:100%;padding:12px;
  background:rgba(192,57,43,0.8);border:none;border-radius:20px;
  color:#f5f0e6;font-family:'Yomogi',cursive;font-size:12px;
  cursor:pointer;transition:all .15s;
}
.ov-btn:hover{background:rgba(192,57,43,1);}
</style>
</head>
<body>

<!-- オープニング演出 -->
<div class="opening" id="opening" onclick="openingTap()">
  <div class="opening-label" id="op-label">今夜のメンバー</div>
  <div class="opening-sprites" id="op-sprites"></div>
  <div class="opening-names" id="op-names"></div>
  <div class="opening-tap">タップして続ける</div>
</div>

<div id="novel-root">
  <!-- ステータスバー -->
  <div class="status-bar">
    <div class="phase-badge" id="phase-badge">PHASE 1</div>
    <div class="air-mini">
      <div class="air-mini-label">空気</div>
      <div class="air-mini-track"><div class="air-mini-fill air-md" id="air-fill" style="width:60%"></div></div>
      <div class="air-mini-val" id="air-val">60</div>
    </div>
    <div class="turn-info" id="turn-info">T1/2</div>
  </div>

  <!-- 立ち絵ステージ -->
  <div class="stage">
    <div class="stage-bg"></div>
    <div class="sprites" id="sprites"></div>
  </div>

  <!-- フェーズ -->
  <div class="phases-row">
    <div class="ph active" id="ph-0">乾杯</div>
    <div class="ph" id="ph-1">会話</div>
    <div class="ph" id="ph-2">盛り上がり</div>
    <div class="ph" id="ph-3">二次会</div>
    <div class="ph" id="ph-4">お開き</div>
  </div>

  <!-- 友達ステータス -->
  <div class="friends-bar" id="friends-bar"></div>

  <!-- テキストボックス -->
  <div class="textbox">
    <div class="textbox-speaker" id="tb-speaker"></div>
    <div class="textbox-main" id="tb-main">場が温まっている…</div>
    <div class="textbox-sub" id="tb-sub"></div>
    <div class="textbox-result" id="tb-result"></div>
  </div>

  <!-- コマンド -->
  <div class="cmd-area">
    <div class="cmd-area-label">
      <span>行動を選ぶ</span>
      <span class="cmd-ap" id="cmd-ap">AP ●</span>
    </div>
    <div class="cmd-grid" id="cmd-grid"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="ov-card">
    <div class="ov-icon" id="ov-icon">⚡</div>
    <div class="ov-title" id="ov-title"></div>
    <div class="ov-body" id="ov-body"></div>
    <button class="ov-btn" id="ov-btn">つづける</button>
  </div>
</div>

<script src="../data/gamedata.js"></script>
<script src="../data/gamestate.js"></script>
<script src="../data/flags.js"></script>
<script>
// ── データ ──
const PARTY   = JSON.parse(localStorage.getItem('goukon_party')   ||'[1,3]');
const H_IDS   = JSON.parse(localStorage.getItem('goukon_heroines')||'[101,102,103]');
const CFG     = JSON.parse(localStorage.getItem('goukon_config')  ||'null');
const SEATING = JSON.parse(localStorage.getItem('goukon_seating') ||'null');
const SELF    = CFG?.self||{comm:50,visu:50,head:50,tact:50,air:50,mental:50,sake:50};
const SELF_SEAT = SEATING?.selfSeat??1;
const ADJ_H   = [SELF_SEAT>0?H_IDS[SELF_SEAT-1]:null,SELF_SEAT<2?H_IDS[SELF_SEAT+1]:null].filter(Boolean);
const FRONT_H = H_IDS[SELF_SEAT];

// ── ゲーム状態 ──
const G={
  phase:0,turn:0,apUsed:0,airGauge:60,
  heart:{},prevHeart:{},
  obsession:{},monopoly:{},twoWorld:{},
  friendIntimacy:{},friendHeart:{},
  targetId:null,
  usedOneTime:new Set(),
  nijikaiDone:false,contactDone:false,
  currentSituation:null,
  activeSprite:null, // 今表示中の立ち絵ID
};

const PHASES=[
  {label:'乾杯',turns:2},
  {label:'会話',turns:3},
  {label:'盛り上がり',turns:3},
  {label:'二次会',turns:2},
  {label:'お開き',turns:2},
];

// ── 立ち絵ヘルパー ──
function imgPath(type, id, expr='normal'){
  // type: 'h'(heroine) or 'm'(man)
  // 画像がなければSVGフォールバック
  return `../images/${type}${id}_${expr}.svg`;
}
function heartToExpr(h){
  return h>=71?'shy':h>=41?'happy':'normal';
}

// ── オープニング演出 ──
let openingStep=0;
function initOpening(){
  showOpeningStep(0);
}
function showOpeningStep(step){
  openingStep=step;
  const op=document.getElementById('opening');
  const label=document.getElementById('op-label');
  const sprites=document.getElementById('op-sprites');
  const names=document.getElementById('op-names');

  if(step===0){
    // 女性3人
    label.textContent='今夜のメンバー（女性）';
    sprites.innerHTML=H_IDS.map(hid=>{
      const h=HEROINES.find(x=>x.id===hid);
      return `<div class="opening-sprite"><img src="${imgPath('h',hid)}" onerror="this.style.display='none'" alt="${h?.name}"></div>`;
    }).join('');
    names.innerHTML=H_IDS.map(hid=>{
      const h=HEROINES.find(x=>x.id===hid);
      return `<div class="opening-name">${h?.name||hid}<br><span style="font-size:8px;opacity:.6">${h?.type?.split('・')[0]||''}</span></div>`;
    }).join('');
  } else if(step===1){
    // 男性2人
    label.textContent='今夜の布陣（友達）';
    sprites.innerHTML=PARTY.map(fid=>{
      const c=CHARACTERS.find(x=>x.id===fid);
      return `<div class="opening-sprite"><img src="${imgPath('m',fid)}" onerror="this.style.display='none'" alt="${c?.name}"></div>`;
    }).join('');
    names.innerHTML=PARTY.map(fid=>{
      const c=CHARACTERS.find(x=>x.id===fid);
      return `<div class="opening-name">${c?.name||fid}<br><span style="font-size:8px;opacity:.6">${(c?.traits||[]).slice(0,1).join('')||'—'}</span></div>`;
    }).join('');
  } else {
    // 閉じる
    op.classList.add('fade');
    setTimeout(()=>{op.style.display='none'; startGame();},500);
  }
}
function openingTap(){showOpeningStep(openingStep+1);}

// ── ゲーム初期化 ──
function startGame(){
  H_IDS.forEach(id=>{G.heart[id]=20;G.prevHeart[id]=20;});
  PARTY.forEach(id=>{
    G.obsession[id]=0;G.monopoly[id]=null;G.twoWorld[id]=null;
    G.friendIntimacy[id]=50;
    G.friendHeart[id]={};
    H_IDS.forEach(hid=>{G.friendHeart[id][hid]=10;});
  });
  G.targetId=FRONT_H;

  // シナジーボーナスを初期値に反映
  const syn = calcSynergy(PARTY, H_IDS, CFG);
  G.synergies  = syn.synergies;
  G.synBonuses = syn.bonuses;
  // 相手女性への初期好感度ボーナス
  Object.entries(syn.bonuses.heartBonus||{}).forEach(([hid,bonus])=>{
    G.heart[parseInt(hid)] = Math.min(100, (G.heart[parseInt(hid)]||20) + bonus);
  });
  // 空気ゲージボーナス
  G.airGauge = Math.min(100, G.airGauge + (syn.bonuses.airBonus||0));

  startPhase(0);
}

function startPhase(idx){G.phase=idx;G.turn=0;G.apUsed=0;nextTurn();}

function nextTurn(){
  ADJ_H.forEach(id=>{G.heart[id]=Math.min(100,(G.heart[id]||20)+2);});
  PARTY.forEach(fid=>{
    const traits=CHARACTERS.find(c=>c.id===fid)?.traits||[];
    const obs=G.obsession[fid]||0;
    if(traits.includes('暴走しやすい')&&Math.random()<0.2){
      G.obsession[fid]=Math.min(5,obs+1);
      H_IDS.forEach(hid=>{G.friendHeart[fid][hid]=Math.min(100,(G.friendHeart[fid][hid]||10)+3);});
    }
    if(traits.includes('惚れっぽい')&&Math.random()<0.12){
      G.obsession[fid]=Math.min(5,obs+1);
      const topH=[...H_IDS].sort((a,b)=>(G.heart[b]||0)-(G.heart[a]||0))[0];
      G.friendHeart[fid][topH]=Math.min(100,(G.friendHeart[fid][topH]||10)+8);
    }
    if(G.obsession[fid]>=3&&!G.twoWorld[fid]&&!G.monopoly[fid]&&Math.random()<0.3){
      G.twoWorld[fid]=H_IDS[Math.floor(Math.random()*H_IDS.length)];
    }
    if(G.obsession[fid]>=5&&!G.monopoly[fid]){
      G.monopoly[fid]=G.twoWorld[fid]||H_IDS[Math.floor(Math.random()*H_IDS.length)];
      G.twoWorld[fid]=null;
    }
    if(traits.includes('学歴厨')&&Math.random()<0.2) G.airGauge=Math.max(0,G.airGauge-4);
    if(traits.includes('譲れる')&&Math.random()<0.4){
      const mf=PARTY.find(id=>G.monopoly[id]);
      if(mf){G.monopoly[mf]=null;G.obsession[mf]=Math.max(0,(G.obsession[mf]||0)-2);G.friendIntimacy[fid]=Math.min(100,(G.friendIntimacy[fid]||50)+15);}
    }
  });
  G.apUsed=0;
  G.currentSituation=generateSituation();
  if(G.currentSituation.air) G.airGauge=Math.max(0,Math.min(100,G.airGauge+G.currentSituation.air));
  clearResult();
  // ステージに全員の立ち絵を表示（通常状態）
  setStageAll();
  renderAll();
}

// ── ステージ制御 ──
function setStageAll(){
  // 全員薄く表示
  const sprites=document.getElementById('sprites');
  sprites.innerHTML='';
  H_IDS.forEach(hid=>{
    const h=HEROINES.find(x=>x.id===hid);
    const expr=heartToExpr(G.heart[hid]||0);
    const div=document.createElement('div');
    div.className='sprite';
    div.id=`sprite-h${hid}`;
    div.innerHTML=`<img src="${imgPath('h',hid,expr)}" alt="${h?.name}" onerror="this.parentNode.style.opacity='.3'"><div class="sprite-label">${h?.name.split(' ')[1]||''}</div>`;
    sprites.appendChild(div);
  });
}

function setStageActive(type, id, expr='normal'){
  // type: 'h' or 'm'
  const sprites=document.getElementById('sprites');
  sprites.innerHTML='';
  // アクティブな1人を大きく表示
  const entity = type==='h'
    ? HEROINES.find(h=>h.id===id)
    : CHARACTERS.find(c=>c.id===id);
  const name = entity?.name.split(' ')[1]||'';

  const div=document.createElement('div');
  div.className='sprite active';
  div.style.width='190px';
  div.style.height='230px';
  div.innerHTML=`<img src="${imgPath(type,id,expr)}" alt="${name}" onerror="this.parentNode.style.opacity='.5'" style="width:100%;height:170%;object-fit:cover;object-position:top center;"><div class="sprite-label">${name}</div>`;
  sprites.appendChild(div);
}

function setStageMultiple(chars){
  // chars: [{type,id,expr,active}]
  const sprites=document.getElementById('sprites');
  sprites.innerHTML='';
  chars.forEach(c=>{
    const entity=c.type==='h'?HEROINES.find(h=>h.id===c.id):CHARACTERS.find(x=>x.id===c.id);
    const name=entity?.name.split(' ')[1]||'';
    const div=document.createElement('div');
    div.className='sprite'+(c.active?' active':c.dim?' dim':'');
    div.innerHTML=`<img src="${imgPath(c.type,c.id,c.expr||'normal')}" alt="${name}" onerror="this.parentNode.style.opacity='.3'"><div class="sprite-label">${name}</div>`;
    sprites.appendChild(div);
  });
}

// ── 状況生成 ──
function generateSituation(){
  const party=PARTY.map(id=>CHARACTERS.find(c=>c.id===id)).filter(Boolean);
  const heroines=H_IDS.map(id=>HEROINES.find(h=>h.id===id)).filter(Boolean);
  const fn=party[Math.floor(Math.random()*party.length)]?.name.split(' ')[1]||'友達';
  const fid=party[Math.floor(Math.random()*party.length)]?.id;
  const rh=heroines[Math.floor(Math.random()*heroines.length)];
  const hn=rh?.name.split(' ')[1]||'彼女';
  const hid=rh?.id;

  for(const fid2 of PARTY){
    const fc=CHARACTERS.find(c=>c.id===fid2);
    const fn2=fc?.name.split(' ')[1]||'友達';
    if(G.twoWorld[fid2]){
      const mh=HEROINES.find(h=>h.id===G.twoWorld[fid2]);
      return {text:`${fn2}と${mh?.name.split(' ')[1]}が2人の世界に入りつつある…`,type:'twoway',friendId:fid2,heroineId:G.twoWorld[fid2],speaker:fn2,spriteType:'m',spriteId:fid2};
    }
    if(G.monopoly[fid2]&&(G.obsession[fid2]||0)>=3){
      const mh=HEROINES.find(h=>h.id===G.monopoly[fid2]);
      return {text:`${fn2}が${mh?.name.split(' ')[1]}を独占している！（暴走${G.obsession[fid2]}/5）`,type:'warning',friendId:fid2,heroineId:G.monopoly[fid2],speaker:null,spriteType:'m',spriteId:fid2};
    }
  }

  const SITS=[
    [{text:`${fn}が乾杯の音頭を取った。場が明るくなった。`,type:'good',air:+8,speaker:fn,spriteType:'m',spriteId:fid},
     {text:`${hn}が「何飲みますか？」と話しかけてきた。`,type:'info',speaker:hn,spriteType:'h',spriteId:hid},
     {text:`席についたばかり。まだ誰も動いていない。`,type:'normal',speaker:null,spriteType:'all'},
     {text:`${hn}がこちらをちらっと見た気がした。`,type:'info',speaker:hn,spriteType:'h',spriteId:hid}],
    [{text:`${hn}が「みんな何してるの？」と話を振ってきた。チャンスかも。`,type:'info',speaker:hn,spriteType:'h',spriteId:hid},
     {text:`${hn}が「さっきの話、面白かったです」と言ってきた。`,type:'good',speaker:hn,spriteType:'h',spriteId:hid},
     {text:`話題が途切れて少し沈黙が続いた。`,type:'warning',air:-5,speaker:null,spriteType:'all'},
     {text:`${fn}がさりげなく追加注文を取った。場が和んだ。`,type:'good',air:+5,speaker:fn,spriteType:'m',spriteId:fid},
     {text:`${hn}が席を少しこちら寄りに動かした気がする。`,type:'info',speaker:hn,spriteType:'h',spriteId:hid}],
    [{text:`ゲームしようという話になってきた。`,type:'good',speaker:null,spriteType:'all'},
     {text:`${hn}が「これ得意なんですよ〜！」と張り切っている。`,type:'good',speaker:hn,spriteType:'h',spriteId:hid},
     {text:`${hn}が急に「ここって霊感ある人います？」と言い始めた。`,type:'warning',air:-10,speaker:hn,spriteType:'h',spriteId:hid},
     {text:`盛り上がってきた。${fn}が調子に乗り始めた。`,type:'warning',speaker:fn,spriteType:'m',spriteId:fid}],
    [{text:`そろそろお開きの空気になってきた。`,type:'normal',speaker:null,spriteType:'all'},
     {text:`${fn}が「二次会どこ行く？」と言い始めた。`,type:'info',speaker:fn,spriteType:'m',spriteId:fid},
     {text:`${hn}がバッグを触り始めた。解散が近い。`,type:'warning',speaker:hn,spriteType:'h',spriteId:hid}],
    [{text:`帰り支度が始まった。最後のチャンス。`,type:'normal',speaker:null,spriteType:'all'},
     {text:`${hn}がこちらをちらっと見た。何かを待っている気がする。`,type:'info',speaker:hn,spriteType:'h',spriteId:hid},
     {text:`解散の挨拶が始まった。`,type:'normal',speaker:null,spriteType:'all'}],
  ];

  const pool=SITS[G.phase]||SITS[0];
  const unused=pool.filter(s=>!G.usedOneTime.has(s.text));
  const s=(unused.length?unused:pool)[Math.floor(Math.random()*(unused.length||pool.length))];
  G.usedOneTime.add(s.text);

  // 立ち絵更新
  if(s.spriteType==='all') setStageAll();
  else if(s.spriteType==='h'&&s.spriteId) setStageActive('h',s.spriteId,heartToExpr(G.heart[s.spriteId]||0));
  else if(s.spriteType==='m'&&s.spriteId) setStageActive('m',s.spriteId);

  return s;
}

// ── コマンド生成 ──
function buildCommands(){
  const used=G.apUsed>=1;
  const air=G.airGauge;
  const airMod=air>=60?1.2:air>=40?1.0:0.6;
  const selfMod=SELF.comm/50;
  const synCmdBonus = G.synBonuses?.cmdBonus||0; // シナジーによるコマンドボーナス
  const synNijikai  = G.synBonuses?.nijikaiBonus||0;
  const sit=G.currentSituation;
  const target=G.targetId;
  const tH=HEROINES.find(h=>h.id===target);
  const tn=tH?.name.split(' ')[1]||'ターゲット';
  const isAdj=ADJ_H.includes(target);
  const cmds=[];

  H_IDS.forEach(hid=>{
    const h=HEROINES.find(x=>x.id===hid);if(!h)return;
    const isFront=hid===FRONT_H,isAdjH=ADJ_H.includes(hid);
    const bonus=isAdjH?3:0;
    const boost=Math.round((8+bonus)*airMod*selfMod);
    const tag=isFront?'正面':isAdjH?'隣':'';
    cmds.push({id:`talk_${hid}`,icon:'💬',
      name:`${h.name.split(' ')[1]}に話しかける`,
      effect:`好感度+${boost}程度`,
      desc:`${tag?tag+'の席。':''}コミュ力${SELF.comm}が効く。${isAdjH?'隣ボーナスあり。':''}`,
      type:'normal',disabled:used||air<15});
  });

  const airBoost=Math.round(8*airMod*selfMod);
  cmds.push({id:'boost_air',icon:'🎉',name:'場を盛り上げる',effect:`空気+${airBoost}、全員+3`,desc:'コミュ力依存。低リスク。自分は目立たない。',type:'normal',disabled:used});

  PARTY.forEach(fid=>{
    const fc=CHARACTERS.find(c=>c.id===fid);if(!fc)return;
    const fn2=fc.name.split(' ')[1];
    const traits=fc.traits||[];
    cmds.push({id:`delegate_${fid}`,icon:'🤝',name:`${fn2}に任せる`,effect:'全員+4〜8、空気+5',desc:`${fn2}（${traits.slice(0,1).join('')||'普通'}）の特性が発動。`,type:'friend',disabled:used});
  });

  if(G.phase>=2&&SELF.head>=50) cmds.push({id:'deep_talk',icon:'🗣',name:`${tn}に深く話しかける`,effect:`成功で+${Math.round(15*airMod*(SELF.head/50))}`,desc:`頭${SELF.head}が効く。リスクあり。`,type:'risk',disabled:used});
  if(G.phase>=2&&SELF.air>=55) cmds.push({id:'move_seat',icon:'🚶',name:`${tn}の隣に移動する`,effect:'成功で+12',desc:`空気読み${SELF.air}が効く。失敗で-6。`,type:'risk',disabled:used||isAdj});
  if(G.phase>=3&&!G.nijikaiDone) cmds.push({id:'nijikai',icon:'🌙',name:'二次会に誘う',effect:'成功で全員+8',desc:`空気${air}以上で成功率↑。今回限り。`,type:'risk',disabled:used||air<35});
  if(G.phase>=4&&!G.contactDone) cmds.push({id:'get_contact',icon:'📱',name:'連絡先を聞く',effect:'好感度50以上で成功',desc:'今回限りのコマンド。',type:'risk',disabled:used});

  // 状況対応
  if(sit){
    if(sit.type==='twoway'&&sit.friendId){
      const fn3=CHARACTERS.find(c=>c.id===sit.friendId)?.name.split(' ')[1];
      const hn3=HEROINES.find(h=>h.id===sit.heroineId)?.name.split(' ')[1];
      cmds.push({id:'cutin_two',icon:'⚡',name:`${fn3}と${hn3}の間に割り込む`,effect:'2人の世界を崩す',desc:`空気-5。独占を防げる。`,type:'event',tag:'対応',disabled:used});
      cmds.push({id:'watch_two',icon:'👀',name:`${fn3}の邪魔をしない`,effect:`${fn3}好感度+15`,desc:'その子はもらえないかも。',type:'event',tag:'対応',disabled:used});
      cmds.push({id:'other_two',icon:'🎯',name:'別の子に集中する',effect:`${tn}好感度↑`,desc:'2人を放置して他の子を狙う。',type:'event',tag:'対応',disabled:used});
    }
    if(sit.type==='warning'&&sit.friendId&&(G.obsession[sit.friendId]||0)>=3){
      const fn4=CHARACTERS.find(c=>c.id===sit.friendId)?.name.split(' ')[1];
      cmds.push({id:`sig_stop_${sit.friendId}`,icon:'✋',name:`${fn4}に「もう引け」`,effect:'暴走リセット',desc:`${fn4}好感度-10。独占を崩す。`,type:'event',tag:'合図',disabled:used});
      cmds.push({id:`sig_go_${sit.friendId}`,icon:'👍',name:`${fn4}に「いっていいぞ」`,effect:`${fn4}好感度+5`,desc:'独占を認める。',type:'event',tag:'合図',disabled:used});
    }
    if(sit.text?.includes('霊感')){
      cmds.push({id:'cutin_weird',icon:'⚡',name:'話題を変える',effect:'成功で空気+10',desc:'コミュ力依存。',type:'event',tag:'対応',disabled:used});
      cmds.push({id:'ride_weird',icon:'🔮',name:'乗っかる',effect:'電波系に+15',desc:'電波系には刺さる。他は引く。',type:'event',tag:'対応',disabled:used});
    }
    if(sit.text?.includes('沈黙')){
      cmds.push({id:'break_silence',icon:'🗣',name:'沈黙を破る',effect:'空気+10〜15',desc:'コミュ力依存。',type:'event',tag:'対応',disabled:used});
    }
    if(sit.text?.includes('音頭')||sit.text?.includes('ゲーム')){
      cmds.push({id:'ride_wave',icon:'🌊',name:'この流れに乗る',effect:'空気+8、全員+4',desc:'低リスク。',type:'event',tag:'対応',disabled:used});
    }
    if((sit.text?.includes('見た')||sit.text?.includes('見つめ'))&&sit.type==='info'){
      cmds.push({id:'eye_contact',icon:'👁',name:'目が合ったら微笑む',effect:`${tn}好感度+10`,desc:'自然なアプローチ。',type:'event',tag:'対応',disabled:used});
    }
  }

  // 居酒屋シナジーコマンド
  if(G.synergies?.some(s=>s.unlockCmd==='izakaya_team')){
    cmds.push({id:'izakaya_team',icon:'🍺',name:'いつものノリで！',effect:'全員+12、空気+15',desc:'居酒屋仲間シナジー解放コマンド。場を一気に盛り上げる。',type:'friend',disabled:used});
  }

  cmds.push({id:'skip',icon:'💨',name:'静観する',effect:'友達の自律行動が強まる',desc:'何もしない。',type:'skip',disabled:used});
  return cmds;
}

// ── コマンド実行 ──
function execCmd(id){
  if(G.apUsed>=1)return;
  G.apUsed=1;
  const air=G.airGauge;
  const airMod=air>=60?1.2:air>=40?1.0:0.6;
  const selfMod=SELF.comm/50;
  const target=G.targetId||FRONT_H;
  const tH=HEROINES.find(h=>h.id===target);
  const tn=tH?.name.split(' ')[1]||'彼女';
  let rt='',rtype='good';

  if(id?.startsWith('talk_')){
    const hid=parseInt(id.replace('talk_',''));
    const h=HEROINES.find(x=>x.id===hid);
    const hn2=h?.name.split(' ')[1]||'彼女';
    const isAdj2=ADJ_H.includes(hid);
    const boost=Math.round((7+Math.random()*6)*airMod*selfMod)+(isAdj2?3:0);
    const prev=G.heart[hid]||20;
    G.heart[hid]=Math.min(100,prev+boost);
    const newH=G.heart[hid];
    const mf2=PARTY.find(fid=>G.monopoly[fid]===hid);
    const reactions={
      high:[`${hn2}が笑顔で返してくれた。`,`${hn2}がこちらに体を向けた。`,`${hn2}が「そうそう！」と乗ってきた。`],
      mid:[`${hn2}が普通に返事をした。`,`${hn2}が少し笑った。`,`${hn2}が相槌を打った。`],
      low:[`${hn2}が短く返した。`,`${hn2}は少し遠い反応だった。`],
      cold:[`${hn2}はけんたの方を向いたまま気づかなかった。`,`${hn2}の反応は薄かった。`],
    };
    let pool=mf2?reactions.cold:newH>=65?reactions.high:newH>=40?reactions.mid:reactions.low;
    rt=pool[Math.floor(Math.random()*pool.length)]+(isAdj2?' （隣ボーナス）':'');
    // 立ち絵切り替え
    setStageActive('h',hid,heartToExpr(newH));

  } else if(id==='boost_air'){
    const b=Math.round((7+Math.random()*8)*airMod*selfMod);
    G.airGauge=Math.min(100,G.airGauge+b);
    H_IDS.forEach(hid=>{G.heart[hid]=Math.min(100,(G.heart[hid]||20)+3);});
    rt=`場を盛り上げた！空気+${b}。全員+3。`;

    else if(traits.includes('惚れっぽい')){const rh=HEROINES.find(h=>h.id===H_IDS[Math.floor(Math.random()*H_IDS.length)]);G.heart[rh.id]=Math.min(100,(G.heart[rh.id]||20)+12);desc=`${fn2}が${rh.name.split(' ')[1]}に積極的に話しかけた。${rh.name.split(' ')[1]}+12。`;}

  } else if(id?.startsWith('sig_stop_')){

  } else if(id==='ride_weird'){
    const wH=H_IDS.find(hid=>HEROINES.find(h=>h.id===hid)?.type?.includes('電波'));if(wH){G.heart[wH]=Math.min(100,(G.heart[wH]||20)+15);rt=`乗っかった！電波系に刺さった。`;setStageActive('h',wH,'happy');}else{G.airGauge=Math.max(0,G.airGauge-8);rt=`誰にも刺さらなかった…空気-8。`;rtype='warning';}
  } else if(id==='break_silence'){
    if(Math.random()<0.35){rt=`沈黙を破ろうとしたが滑った…`;rtype='warning';}else{const b=Math.round(12*airMod*selfMod);G.airGauge=Math.min(100,G.airGauge+b);rt=`沈黙を自然に破った！空気+${b}。`;}
  } else if(id==='ride_wave'){
    G.airGauge=Math.min(100,G.airGauge+8);H_IDS.forEach(hid=>{G.heart[hid]=Math.min(100,(G.heart[hid]||20)+4);});rt=`流れに乗った。空気+8、全員+4。`;setStageAll();
  } else if(id==='eye_contact'){
    G.heart[target]=Math.min(100,(G.heart[target]||20)+10);rt=`目が合って微笑んだ。${tn}好感度↑`;setStageActive('h',target,heartToExpr(G.heart[target]));
  } else if(id==='izakaya_team'){
    G.airGauge=Math.min(100,G.airGauge+15);
    H_IDS.forEach(hid=>{G.heart[hid]=Math.min(100,(G.heart[hid]||20)+12);});
    rt=`いつものノリで！居酒屋仲間が一気に場を盛り上げた！空気+15。全員+12。`;
    setStageAll();
  } else if(id==='skip'){
    PARTY.forEach(fid=>{const t=CHARACTERS.find(c=>c.id===fid)?.traits||[];if(t.includes('暴走しやすい')||t.includes('惚れっぽい'))G.obsession[fid]=Math.min(5,(G.obsession[fid]||0)+1);});rt=`静観した。友達が自律的に動いている…`;rtype='info';
  }

  showResult(rt,rtype);
  renderUI();
  setTimeout(finishTurn,900);
}

function finishTurn(){
  G.turn++;
  if(G.turn>=PHASES[G.phase].turns){
    if(G.phase>=4){endGame();return;}
    const next=G.phase+1;
    const transText=['','乾杯が終わり会話が始まった。\n誰が誰に興味を持つか見えてくる。','会話が盛り上がってきた。\n友達の暴走に注意。','そろそろお開きの空気。\n二次会に持ち込めるか。','最後のチャンス。\n今動かないと後悔する。'];
    showOv(['🥂','💬','🎮','🌃','👋'][next],PHASES[next].label,transText[next],'はじめる',()=>{closeOv();startPhase(next);});
  } else nextTurn();
}

function endGame(){
  const r={};H_IDS.forEach(id=>{r[id]={heart:G.heart[id]||0,heartPrev:G.prevHeart[id]||0};});
  localStorage.setItem('goukon_result',JSON.stringify({heroineStatus:r}));
  location.href='result.html';
}

// ── レンダリング ──
function renderAll(){renderStatusBar();renderPhases();renderFriends();renderSituation();renderCmds();}
function renderUI(){renderStatusBar();renderFriends();renderCmds();}

function renderStatusBar(){
  const v=G.airGauge;
  const af=document.getElementById('air-fill');
  af.style.width=v+'%';
  af.className='air-mini-fill '+(v>=60?'air-hi':v>=40?'air-md':'air-lo');
  document.getElementById('air-val').textContent=v;
  document.getElementById('phase-badge').textContent=`PHASE ${G.phase+1} ${PHASES[G.phase].label}`;
  document.getElementById('turn-info').textContent=`T${G.turn+1}/${PHASES[G.phase].turns}`;
}

function renderPhases(){
  for(let i=0;i<5;i++){const e=document.getElementById('ph-'+i);if(!e)continue;e.className='ph';if(i<G.phase)e.classList.add('done');else if(i===G.phase)e.classList.add('active');}
}

function renderFriends(){
  const bar=document.getElementById('friends-bar');bar.innerHTML='';
  const selfComm=SELF.comm||50;
  PARTY.forEach(fid=>{
    const c=CHARACTERS.find(x=>x.id===fid);if(!c)return;
    const obs=G.obsession[fid]||0;
    const mono=G.monopoly[fid];const two=G.twoWorld[fid];
    const fn=c.name.split(' ')[1];
    const fHearts=G.friendHeart[fid]||{};
    const topHid=[...H_IDS].sort((a,b)=>(fHearts[b]||0)-(fHearts[a]||0))[0];
    const topHeart=fHearts[topHid]||0;
    const mhName=HEROINES.find(h=>h.id==(mono||two||topHid))?.name.split(' ')[1]||'誰か';
    let flavor='';
    if(selfComm<=49) flavor=`${fn}が話しかけている`;
    else if(selfComm<=69){
      if(mono||two) flavor=`${fn}と${mhName}がいい感じに`;
      else if(obs>=3) flavor=`${fn}が誰かに入れ込んでいる`;
      else if(topHeart>=30) flavor=`${fn}が誰かと盛り上がっている`;
      else flavor=`${fn}は様子を見ている`;
    } else if(selfComm<=89){
      if(mono||two) flavor=`${fn}が${mhName}にかなり入れ込んでいる気がする`;
      else if(obs>=3) flavor=`${fn}が${mhName}に本気になりつつある`;
      else if(topHeart>=50) flavor=`${fn}は${mhName}のことが気になっているようだ`;
      else flavor=`${fn}は${mhName}と普通に話している`;
    } else {
      if(mono||two) flavor=`${fn}が${mhName}に完全に惚れている。合図を送るなら今だ`;
      else if(obs>=3) flavor=`${fn}が${mhName}に本気だ。このままだとまずい`;
      else if(topHeart>=50) flavor=`${fn}は${mhName}が気になっている。放置すると取られるかも`;
      else flavor=`${fn}は${mhName}と話しているが余裕がありそう`;
    }
    const div=document.createElement('div');
    div.className='fc'+(obs>=3?' warn':'');
    div.innerHTML=`<div style="display:flex;align-items:center;gap:4px;"><span class="fc-name">${fn}</span><span class="fc-obs ${obs>=3?'hi':''}">暴${obs}/5</span></div><div class="fc-flavor">${flavor}</div>`;
    bar.appendChild(div);
  });
}

function renderSituation(){
  const sit=G.currentSituation;if(!sit)return;
  document.getElementById('tb-speaker').textContent=sit.speaker?`── ${sit.speaker}`:'';
  const tm=document.getElementById('tb-main');
  tm.textContent=sit.text;
  tm.className='textbox-main'+(sit.type==='warning'?' warn':sit.type==='good'?' good':sit.type==='info'?' info':'');
  document.getElementById('tb-sub').textContent='';
  clearResult();
}

function clearResult(){const r=document.getElementById('tb-result');r.style.display='none';r.textContent='';r.className='textbox-result';}
function showResult(text,type){const r=document.getElementById('tb-result');r.textContent=text;r.className='textbox-result '+(type||'good');r.style.display='block';}

function renderCmds(){
  const grid=document.getElementById('cmd-grid');grid.innerHTML='';
  const cmds=buildCommands();
  const used=G.apUsed>=1;
  document.getElementById('cmd-ap').textContent='AP '+(used?'○':'●');

  const active=cmds.filter(c=>c.type==='event');
  const normal=cmds.filter(c=>c.type!=='event'&&c.type!=='skip');
  const skip=cmds.filter(c=>c.type==='skip');

  const addSec=(label,list)=>{
    if(!list.length)return;
    if(label){const d=document.createElement('div');d.className='section-divider';d.textContent=label;grid.appendChild(d);}
    list.forEach(c=>{
      const div=document.createElement('div');
      div.className='cmd '+(c.type==='friend'?'friend-type':c.type==='risk'?'risk-type':c.type==='event'?'event-type':c.type==='skip'?'skip-type':'')+(c.disabled?' disabled':'');
      div.innerHTML=`<div class="cmd-icon">${c.icon}</div><div class="cmd-body"><div class="cmd-name">${c.name}</div>${c.effect?`<div class="cmd-effect">→ ${c.effect}</div>`:''}<div class="cmd-desc">${c.desc}</div></div>${c.type==='risk'?'<span class="cmd-tag tag-r">リスク</span>':c.type==='event'?`<span class="cmd-tag tag-e">${c.tag||'対応'}</span>`:c.type==='friend'?'<span class="cmd-tag tag-f">友達</span>':''}`;
      if(!c.disabled)div.onclick=()=>execCmd(c.id);
      grid.appendChild(div);
    });
  };

  if(active.length)addSec('── 今の状況への対応',active);
  addSec(active.length?'── 能動的な行動':'',normal);
  addSec(null,skip);
}

// ターゲット選択（女性カードタップ）
function selectTarget(hid){G.targetId=hid;renderCmds();}

function showOv(icon,title,body,btn,cb){
  document.getElementById('ov-icon').textContent=icon;
  document.getElementById('ov-title').textContent=title;
  document.getElementById('ov-body').textContent=body;
  const b=document.getElementById('ov-btn');b.textContent=btn;b.onclick=cb||closeOv;
  document.getElementById('overlay').classList.add('show');
}
function closeOv(){document.getElementById('overlay').classList.remove('show');}

initOpening();
</script>
